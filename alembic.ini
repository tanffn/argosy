# Alembic configuration for Argosy.
# Note: SQLAlchemy URL is overridden in alembic/env.py from argosy.config.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
# Empty placeholder; the real URL is injected at runtime in env.py.
sqlalchemy.url =

[post_write_hooks]
# (unused)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
