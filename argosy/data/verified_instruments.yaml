# Verified-facts cache for the Alternatives sleeve.
#
# Each entry is a set of FACTS about a real instrument, confirmed against the
# cited source_url on verified_on. This is NOT an allow-list: the agent team may
# propose any instrument; only VERIFIED facts let a pick become a holding. An
