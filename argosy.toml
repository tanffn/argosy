# Argosy top-level configuration
# Install path; everything else derives from this.
# Default behavior: ARGOSY_HOME env var, else directory containing argosy.toml.

[paths]
home = "."
backups = "./backups"
db_file = "./db/argosy.db"
domain_knowledge = "./domain_knowledge"
configs = "./configs"
logs = "./logs"

[server]
api_port = 8000
ui_port = 1337
api_host = "127.0.0.1"

[anthropic]
# Backend selector for the BaseAgent LLM call.
#   "claude_code" — auth via the local `claude.exe` session (Claude Agent
#                   SDK). No API key needed; cost lands on the user's
#                   Claude Code subscription. Default.
#   "api_key"     — direct Anthropic API via the `anthropic` SDK.
#                   Reads the key from the OS keychain (preferred) or
#                   the `ANTHROPIC_API_KEY` env var.
backend = "claude_code"
# Used only when backend = "api_key".
keychain_key_name = "argosy.anthropic.api_key"
